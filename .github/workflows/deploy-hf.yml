name: Deploy to HF Spaces

# CD — déploiement continu vers les HuggingFace Spaces.
# Se déclenche UNIQUEMENT après une CI verte sur main (chaîne CI -> CD),
# ou manuellement via "Run workflow".
on:
  workflow_run:
    workflows: ["Meteo MLOps CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    # Ne déploie que si la CI a réussi ET sur main (ou en lancement manuel).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - src: mlflow
            space: meteo-mlflow
          - src: data_api
            space: meteo-data-api
          - src: model_api
            space: meteo-model-api
          - src: dashboard
            space: meteo-dashboard

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Vérifier la présence du secret HF_TOKEN
        id: guard
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::Secret HF_TOKEN absent — déploiement ignoré."
            echo "::warning::Ajoutez-le dans Settings > Secrets and variables > Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Déployer ${{ matrix.src }} -> Space ${{ matrix.space }}"
        if: steps.guard.outputs.skip == 'false'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: erimer974
        run: |
          set -euo pipefail
          # Clone du Space HF (contient le README de config + .gitattributes)
          git clone --depth 1 \
            "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${{ matrix.space }}" \
            hf_space

          # Recopie les fichiers source par-dessus, SANS toucher au README HF
          # ni aux fichiers spécifiques du Space (.gitattributes, .git).
          cp -f ${{ matrix.src }}/* hf_space/

          cd hf_space
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Aucun changement à déployer pour ${{ matrix.space }}."
          else
            git commit -m "Deploy from main @ ${GITHUB_SHA::7} (CI verte)"
            git push
            echo "✅ ${{ matrix.space }} déployé."
          fi
