# ── Ancre Airflow commune ────────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "meteo-mlops-secret-key"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      mlflow>=2.12,<3.0 scikit-learn==1.7.2 boto3>=1.34
      pandas>=2.0 requests>=2.31 python-dotenv>=1.0
      kaggle>=1.6
    DATA_API_BASE_URL: http://data-api:7860
    MODEL_API_BASE_URL: http://model-api:7860
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    KAGGLE_USERNAME: ${KAGGLE_USERNAME}
    KAGGLE_KEY: ${KAGGLE_KEY}
    S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    S3_RAW_PREFIX: ${S3_RAW_PREFIX}
    S3_PROD_PREFIX: ${S3_PROD_PREFIX}
    DATABASE_URL: ${DATABASE_URL}
    DB_TARGET_TABLE: ${DB_TARGET_TABLE}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./train:/opt/airflow/train
    - ./utils:/opt/airflow/utils
    - ./monitoring:/opt/airflow/monitoring
    - ./etl.py:/opt/airflow/etl.py
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-postgres:
      condition: service_healthy

# ── Services principaux ───────────────────────────────────────────────────────
services:

  data-api:
    build: ./data_api
    ports:
      - "8001:7860"
    env_file: .env

  model-api:
    build: ./model_api
    ports:
      - "8002:7860"
    env_file: .env

  dashboard:
    build: ./dashboard
    ports:
      - "8501:7860"
    env_file: .env
    depends_on:
      - data-api
      - model-api

  mlflow:
    build: ./mlflow
    ports:
      - "5000:7860"
    env_file: .env
    environment:
      BACKEND_STORE_URI: ${DATABASE_URL}
      ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT}
    restart: unless-stopped

# ── Airflow (profil séparé) ───────────────────────────────────────────────────
  airflow-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always
    profiles:
      - airflow

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    profiles:
      - airflow

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      start_period: 5m
      interval: 30s
      timeout: 60s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
    profiles:
      - airflow

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always
    profiles:
      - airflow

# ── ETL (profil séparé) ───────────────────────────────────────────────────────
  etl:
    build: .
    env_file: .env
    environment:
      DATA_API_BASE_URL: http://data-api:7860
      MODEL_API_BASE_URL: http://model-api:7860
    depends_on:
      - data-api
      - model-api
    profiles:
      - etl

volumes:
  airflow-postgres-data:
