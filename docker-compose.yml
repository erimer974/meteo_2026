services:

  data-api:
    build: ./data_api_HF
    ports:
      - "8001:7860"
    env_file: .env

  model-api:
    build: ./model_api_HF
    ports:
      - "8002:7860"
    env_file: .env

  dashboard:
    build: ./dashboard_HF
    ports:
      - "8501:7860"
    env_file: .env
    depends_on:
      - data-api
      - model-api

  etl:
    build: .
    env_file: .env
    environment:
      DATA_API_BASE_URL: http://data-api:7860
      MODEL_API_BASE_URL: http://model-api:7860
    depends_on:
      - data-api
      - model-api
    profiles:
      - etl
